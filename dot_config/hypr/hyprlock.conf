general {
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
}

input-field {
    monitor =
    size = 250, 60
    position = 0, -80
    halign = center
    valign = center

    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    fade_on_empty = false
    placeholder_text = Passwort...
}

label {
    monitor =
    text = $TIME
    font_size = 64
    position = 0, 120
    halign = center
    valign = center
}